name: Management Group Deployment CI
run-name: "Management Group - ${{ github.event.inputs.customer_name }} | Branch:${{ github.ref }}"

on:
  workflow_dispatch:
    inputs:
      customer_name:
        description: 'Customer name (folder name in tenant directory)'
        required: true
        type: string
    #   planGitHubEnvironment:
    #     description: 'GitHub Environment for Planning'
    #     required: true
    #     type: choice
    #     options: [dev, staging, prod]
    #   deployGitHubEnvironment:
    #     description: 'GitHub Environment for Deployment'
    #     required: true
    #     type: choice
    #     options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: mgmt-${{ github.event.inputs.customer_name }}-${{ github.event.inputs.deployGitHubEnvironment }}
  cancel-in-progress: false

env:
  CUSTID: ${{ github.event.inputs.customer_name }}
  CUSTOMER_FOLDER: tenant/${{ github.event.inputs.customer_name }}
  TF_ROOT: tenant/managementgroups
  TERRAFORM_VERSION: 1.9.5   # pin a real Terraform version

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.planGitHubEnvironment }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.planGitHubEnvironment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate Customer Folder
        run: |
          if [ ! -d "${{ env.CUSTOMER_FOLDER }}" ]; then
            echo "::error::Customer folder not found at ${{ env.CUSTOMER_FOLDER }}"
            exit 1
          fi
          echo "✓ Customer folder found: ${{ env.CUSTOMER_FOLDER }}"

      - name: Locate tfvars file
        id: tfvars
        run: |
          TFVARS_FILE=$(find "${{ env.CUSTOMER_FOLDER }}" -maxdepth 1 -name "*.tfvars" -type f | head -1)
          if [ -z "$TFVARS_FILE" ]; then
            echo "::error::No .tfvars file found in ${{ env.CUSTOMER_FOLDER }}"
            exit 1
          fi
          echo "✓ Found tfvars: $TFVARS_FILE"
          # Path is relative to repo root; compute path relative to TF_ROOT for terraform commands
          REL_TFVARS="../../${TFVARS_FILE}"
          echo "TFVARS_FILE=${TFVARS_FILE}"        >> "$GITHUB_ENV"
          echo "TFVARS_REL=../${CUSTID}/$(basename ${TFVARS_FILE})" >> "$GITHUB_ENV"

      - name: Set Terraform variables
        run: echo "TF_VAR_environment=${{ env.DEPLOY_ENV }}" >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ${{ env.TF_ROOT }} ${{ env.CUSTOMER_FOLDER }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init -upgrade

      - name: Terraform Validate
        working-directory: ${{ env.TF_ROOT }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_ROOT }}
        run: |
          echo "Using var-file: ${TFVARS_REL}"
          terraform plan \
            -var-file="${TFVARS_REL}" \
            -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.CUSTID }}-${{ env.DEPLOY_ENV }}
          path: ${{ env.TF_ROOT }}/tfplan
          retention-days: 1

