name: "TFLint"

description: "Install and run the latest TFLint against the repository root."
=======
inputs:
  working-directory:
    description: "Directory containing the Terraform code to lint."
    required: false
    default: "."
  tflint_version:
    description: "TFLint version to install (default: latest)."
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Setup TFLint (latest)
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: latest

    - name: TFLint version
      shell: bash
      run: tflint --version

    - name: TFLint init (download plugins)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: tflint --init

    - name: Run TFLint
      shell: bash
      run: tflint --format=default --call-module-type=local