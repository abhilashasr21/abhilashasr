name: "TFLint"

description: "Use Checkov Terraform Scan"
inputs:
  working-directory:
    description: "Directory containing the Terraform code for Scan."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Setup TFLint (latest)
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: latest

    - name: TFLint version
      shell: bash
      run: tflint --version

    - name: TFLint init (download plugins)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: tflint --init

    - name: Run TFLint
      shell: bash
      run: tflint --format=default --call-module-type=local

    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: tenant/managementgroups
        framework: terraform
        output_format: cli,sarif
        output_file_path: console,results.sarif
        soft_fail: false

    - name: Upload SARIF results
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif