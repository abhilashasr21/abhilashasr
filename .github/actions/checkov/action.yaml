name: "TFLint"

description: "Use Checkov Terraform Scan"
# inputs:
#   working-directory:
#     description: "Directory containing the Terraform code for Scan."
#     required: false
#     default: "."

runs:
  using: "composite"
  steps:
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: tenant/managementgroups
        framework: terraform
        output_format: cli,sarif
        output_file_path: console,results.sarif
        soft_fail: false

    - name: Upload SARIF results
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif