[pytest]
# Pytest configuration for insights-agent tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    asyncio: Async tests using pytest-asyncio
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require Azure services)
    e2e: End-to-end tests (full workflow testing)
    evaluation: Evaluation tests (LLM response quality)
    slow: Tests that take a long time to run

# Async mode for pytest-asyncio
asyncio_mode = auto

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# Output formatting
addopts = 
    --tb=short
    --strict-markers
    -ra
